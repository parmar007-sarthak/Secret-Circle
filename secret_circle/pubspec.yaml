name: secret_circle
description: "Secret Circle - Anonymous Connect App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  google_sign_in: ^6.2.1
  geolocator: ^11.0.0
  geocoding: ^4.0.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  uuid: ^4.3.3
  timeago: ^3.6.1
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/secret_circle_logo.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/secret_circle_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
